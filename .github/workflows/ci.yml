# Phase 8 — CI workflow.
#
# Mirrors the local verification chain so a green CI run means the same
# things are passing remotely as the user has been running locally
# (tsc → lint → unit tests → build → e2e). Triggers on every push and
# every PR, regardless of branch — narrow this if the team's branching
# strategy ever wants only main / only PRs to run.
#
# No secrets required. The build has sensible env-var defaults
# (`VITE_*` overrides resolve to bundled-local paths when unset). No
# deploy step here — Vercel handles deployment via its own GitHub
# integration, separate from Actions.

name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

# Cancel any in-flight runs for the same ref when a newer commit lands.
# Saves Actions minutes on rapid pushes / force-pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify (tsc + lint + tests + build + e2e)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # Node 20 LTS. Bump when the project pins a newer version
          # (e.g. via .nvmrc or package.json engines).
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        # `--legacy-peer-deps` is required because the @kerv-one/theme
        # local package pulls in MUI 6 nested deps and we have MUI 7
        # at the top level — see kerv-one-theme/INTEGRATION_NOTES.md.
        # `npm ci` honors package-lock.json for deterministic installs.
        run: npm ci --legacy-peer-deps

      - name: Type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit tests (Vitest)
        run: npm run test:run

      - name: Build (production)
        run: npm run build

      - name: Install Playwright browser
        # Browser binaries cache nicely under ~/.cache/ms-playwright;
        # the setup-node cache action above doesn't cover them, but
        # the install is fast enough (~10s) that it's not worth a
        # separate cache step yet. Bump to actions/cache if Actions
        # minutes ever feel tight.
        run: npx playwright install --with-deps chromium

      - name: E2E tests (Playwright golden-path)
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
