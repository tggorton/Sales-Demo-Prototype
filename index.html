<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/assets/kerv-logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="KERV Sales Demo Tool – interactive content intelligence walkthrough." />
    <title>KERV Sales Demo</title>
    <!-- KERV brand font (loaded by the @kerv-one/theme kit). The theme expects
         Open Sans across all MUI Typography variants. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <!-- Preload first-paint critical assets so they download in parallel with the
         JS bundle. The hero image is the biggest paint-blocker on the login
         screen; preloading it shaves ~300-500ms off the first meaningful paint
         on a typical event-venue wifi connection. -->
    <link rel="preload" as="image" href="/assets/login-hero.jpg" fetchpriority="high" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
